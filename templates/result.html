<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ mood }}风格推荐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .style-badge { display: inline-block; padding: 10px 25px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 25px; font-size: 18px; font-weight: 600; }
        .style-emoji { font-size: 32px; margin-right: 8px; }
        .song-list { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .song-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; transition: background 0.3s; }
        .song-item:last-child { border-bottom: none; }
        .song-item:hover { background: #f8f9fa; }
        .song-number { width: 35px; height: 35px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 600; margin-right: 15px; flex-shrink: 0; }
        .song-info { flex: 1; }
        .song-title { font-size: 16px; color: #333; font-weight: 500; margin-bottom: 4px; }
        .song-artist { font-size: 14px; color: #888; }
        .song-player { margin-top: 10px; width: 100%; }
        .song-player audio { width: 100%; height: 40px; border-radius: 20px; }
        .song-actions { display: flex; align-items: center; gap: 10px; }
        .delete-btn { background: #ff6b6b; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; justify-content: center; align-items: center; transition: all 0.3s; }
        .delete-btn:hover { background: #ee5253; transform: scale(1.1); }
        .song-icon { font-size: 24px; }
        .upload-section { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .upload-section h2 { font-size: 20px; color: #333; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; font-size: 15px; border: 2px solid #e0e0e0; border-radius: 10px; outline: none; transition: all 0.3s; }
        .form-group input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .back-link { text-align: center; margin-top: 10px; }
        .back-link a { color: white; text-decoration: none; font-size: 14px; padding: 10px 20px; background: rgba(255,255,255,0.2); border-radius: 20px; transition: all 0.3s; }
        .back-link a:hover { background: rgba(255,255,255,0.3); }
        .empty-message { text-align: center; padding: 40px; color: #888; }
        .empty-message .emoji { font-size: 48px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 为你推荐</h1>
            <div class="style-badge"><span class="style-emoji">{{ emoji }}</span>{{ mood }}</div>
        </div>
        <div class="song-list">
            {% if songs %}
                {% for song in songs %}
                <div class="song-item">
                    <div class="song-number">{{ loop.index }}</div>
                    <div class="song-info">
                        <div class="song-title">{{ song.song }}</div>
                        <div class="song-artist">{{ song.artist }}</div>
                        {% if song.url %}
                        <div class="song-player"><audio controls src="{{ song.url }}"></audio></div>
                        {% endif %}
                    </div>
                    <div class="song-actions">
                        <div class="song-icon">🎶</div>
                        <form action="/delete" method="post" onsubmit="return confirm('确定要删除这首歌曲吗？')">
                            <input type="hidden" name="mood" value="{{ mood }}">
                            <input type="hidden" name="index" value="{{ loop.index0 }}">
                            <button type="submit" class="delete-btn" title="删除歌曲">🗑️</button>
                        </form>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-message"><div class="emoji">🎵</div><p>暂无歌曲，快来添加吧！</p></div>
            {% endif %}
        </div>
        <div class="upload-section">
            <h2>📤 添加歌曲</h2>
            <form action="/upload" method="post">
                <input type="hidden" name="mood" value="{{ mood }}">
                <div class="form-group"><label>歌曲名称</label><input type="text" name="song_name" placeholder="请输入歌曲名称" required></div>
                <div class="form-group"><label>歌手名称</label><input type="text" name="artist" placeholder="请输入歌手名称" required></div>
                <div class="form-group"><label>歌曲链接（可选）</label><input type="url" name="url" placeholder="支持网易云音乐外链"></div>
                <button type="submit" class="btn btn-primary">➕ 添加歌曲</button>
            </form>
        </div>
        <div class="back-link"><a href="/">🏠 返回首页</a></div>
    </div>
</body>
</html>
